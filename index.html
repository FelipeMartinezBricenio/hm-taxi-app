<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H&M Taxi Control</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1b32">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="login-container" class="auth-wrapper">
        <div class="auth-card">
            <img src="logo.png" alt="H&M Logo" class="login-logo">
            <h2>Acceso al Sistema</h2>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="user-input" placeholder="Usuario">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="pass-input" placeholder="Contraseña">
            </div>
            <button onclick="handleLogin()" class="btn-login">Ingresar</button>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <header class="main-header">
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <div>Hola, <span id="display-user"></span> <small>(<span id="user-role"></span>)</small></div>
            </div>
            <button onclick="handleLogout()" class="btn-logout"><i class="fas fa-power-off"></i></button>
        </header>

        <main>
            <div class="status-tabs" id="status-tabs-container"></div>
            
            <button id="btn-nuevo-viaje" class="fab-button" onclick="abrirModalNuevoViaje()" style="display:none;">
                <i class="fas fa-plus"></i>
            </button>

            <div id="viajes-list"></div>
        </main>

        <div id="nuevo-viaje-modal" class="modal">
            <div class="modal-content">
                <h3><i class="fas fa-taxi"></i> Nuevo Servicio</h3>
                <div class="f-item"><label>Chofer:</label><select id="reg-chofer"></select></div>
                <div class="f-item"><label>Monto (S/):</label><input type="number" id="reg-monto" step="0.10" placeholder="0.00"></div>
                <div class="f-item"><label>Origen:</label><input type="text" id="reg-origen" placeholder="Dirección inicio"></div>
                <div class="f-item"><label>Parada 1 (Opc):</label><input type="text" id="reg-p1"></div>
                <div class="f-item"><label>Parada 2 (Opc):</label><input type="text" id="reg-p2"></div>
                <div class="f-item"><label>Destino Final:</label><input type="text" id="reg-destino" placeholder="Dirección fin"></div>
                <div class="modal-actions">
                    <button onclick="guardarNuevoViaje()" class="btn-save">Guardar</button>
                    <button onclick="cerrarModalNuevoViaje()" class="btn-cancel">Cerrar</button>
                </div>
            </div>
        </div>

        <div id="pago-modal" class="modal">
            <div class="modal-content">
                <h3><i class="fas fa-check-circle"></i> Finalizar Viaje</h3>
                <p id="pago-monto-label" style="font-weight:bold; color:var(--success); font-size:1.2rem; text-align:center;"></p>
                <div class="modal-actions">
                    <button onclick="confirmarPago()" class="btn-save" style="flex:2">Confirmar Pago</button>
                    <button onclick="cerrarModalPago()" class="btn-cancel" style="flex:1">Atrás</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
</body>
</html>
