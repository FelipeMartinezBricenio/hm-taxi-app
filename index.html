<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H&M Taxi Control - Sistema de Auditoría</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root { --hm-orange: #f37a1f; --hm-navy: #0d1b32; --bg: #f1f5f9; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #1e293b; }

        /* Estilo para ocultar el cuadro de texto de la ruta que sale por defecto */
        .leaflet-routing-container { display: none !important; }

        .auth-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--hm-navy); padding: 20px; }
        .auth-card { background: white; padding: 40px 30px; border-radius: 30px; width: 100%; max-width: 380px; text-align: center; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: #94a3b8; }
        .input-group input { width: 100%; padding: 14px 14px 14px 45px; border: 1.5px solid #e2e8f0; border-radius: 15px; outline: none; }
        .btn-login { width: 100%; padding: 16px; background: var(--hm-orange); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }

        .main-header { background: var(--hm-navy); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .status-tabs { display: flex; gap: 10px; padding: 15px; background: white; overflow-x: auto; border-bottom: 1px solid #e2e8f0; }
        .tab-btn { border: none; padding: 10px 20px; border-radius: 25px; background: #f1f5f9; color: #64748b; font-weight: 600; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--hm-orange); color: white; }

        .fab-button { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--hm-orange); color: white; border-radius: 50%; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); font-size: 24px; display: none; align-items: center; justify-content: center; z-index: 999; }

        .modal { display:none; position:fixed; inset:0; background:rgba(13, 27, 50, 0.8); z-index:2000; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:white; padding:25px; border-radius:25px; width:100%; max-width:450px; max-height: 90vh; overflow-y: auto; }
        .f-group { margin-bottom: 12px; }
        .f-group label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: var(--hm-navy); }
        .f-group input, .f-group select { width: 100%; padding: 10px; border-radius: 10px; border: 1.5px solid #e2e8f0; outline: none; }
        .f-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-step { border:none; background: var(--hm-navy); color:white; padding:10px 15px; border-radius:10px; font-weight:bold; font-size:0.75rem; cursor:pointer; }
    </style>
</head>
<body>

    <div id="login-container" class="auth-wrapper">
        <div class="auth-card">
            <h2 style="margin-bottom:20px; color: var(--hm-navy);">H&M Audits</h2>
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="user-input" placeholder="Usuario"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="pass-input" placeholder="Contraseña"></div>
            <button onclick="handleLogin()" class="btn-login">ENTRAR</button>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <header class="main-header">
            <div>
                <div style="font-size: 0.6rem; opacity: 0.8;">HOLA,</div>
                <div style="font-weight: bold;" id="display-user"></div>
            </div>
            <button onclick="handleLogout()" style="background:none; border:none; color:white;"><i class="fas fa-sign-out-alt"></i></button>
        </header>
        <div class="status-tabs" id="status-tabs-container"></div>
        <main id="viajes-list"></main>
        <button id="btn-nuevo-viaje" class="fab-button" onclick="abrirModalNuevoViaje()"><i class="fas fa-plus"></i></button>
    </div>

    <div id="nuevo-viaje-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px;">Nuevo Servicio</h3>
            <div class="f-group"><label>Chofer</label><select id="reg-chofer"></select></div>
            <div class="f-group"><label>Monto Total (S/)</label><input type="number" id="reg-monto" step="0.1"></div>
            <div class="f-group"><label>Origen</label><input type="text" id="reg-origen" placeholder="Dirección origen"></div>
            <div class="f-row">
                <div class="f-group"><label>Parada 1</label><input type="text" id="reg-p1"></div>
                <div class="f-group"><label>S/ P1</label><input type="number" id="reg-monto-p1" value="0"></div>
            </div>
            <div class="f-row">
                <div class="f-group"><label>Parada 2</label><input type="text" id="reg-p2"></div>
                <div class="f-group"><label>S/ P2</label><input type="number" id="reg-monto-p2" value="0"></div>
            </div>
            <div class="f-group"><label>Destino Final</label><input type="text" id="reg-destino"></div>
            <button onclick="guardarNuevoViaje()" class="btn-login">CREAR</button>
            <button onclick="cerrarModalNuevoViaje()" style="background:none; border:none; width:100%; margin-top:10px; color:#94a3b8;">Cancelar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="app.js"></script>
</body>
</html>
